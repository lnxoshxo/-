version: '3.9'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "cd frontend && npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: /api
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "cd backend && npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      BACKEND_PORT: 3001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
