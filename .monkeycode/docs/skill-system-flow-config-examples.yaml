      source: monitoring
      condition: severity == "P1"
    nodes:
      - key: start
        type: start
      - key: alert_triage
        type: task
        role: SPC
        skillCode: 5.02.01
        slaMinutes: 5
      - key: command_center
        type: approval
        role: GM
        skillCode: 9.03.01
        slaMinutes: 10
      - key: recover
        type: task
        role: MGR
        skillCode: 5.02.03
        slaMinutes: 60
      - key: external_comms
        type: task
        role: DIR
        skillCode: 9.03.02
        slaMinutes: 30
      - key: postmortem
        type: task
        role: PMO
        skillCode: 9.03.04
        slaHours: 24
      - key: end
        type: end
    escalation:
      onTimeout:
        notifyRoles: [GM]

